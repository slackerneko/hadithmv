<!DOCTYPE html>
<html lang="dv-MV" dir="rtl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="google" content="notranslate">
    <title>ޤުރްއާން - ޙަދީޘްއެމްވީ</title>
    <link rel="stylesheet" href="../src/index.css">
    <link rel="stylesheet" href="./quran.css">
</head>
<body>
    <header>
        <a href="../">← ޙަދީޘްއެމްވީ</a>
        <h1>ޤުރްއާން</h1>
    </header>

    <div class="filters">
        <div class="filter-group">
            <label for="filter-surah">ސޫރަތް</label>
            <select id="filter-surah">
                <option value="">ހުރިހާ ސޫރަތެއް</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filter-juz">ޖުޒްء</label>
            <select id="filter-juz">
                <option value="">ހުރިހާ ޖުޒްءއެއް</option>
            </select>
        </div>
        <div class="filter-group" id="ayah-filter-group" style="display:none">
            <label for="filter-ayah">އާޔަތް ނަންބަރ</label>
            <input type="number" id="filter-ayah" min="1" placeholder="ނަންބަރ...">
        </div>
        <div class="filter-actions">
            <button class="btn btn-ghost" id="btn-reset">ރީސެޓް</button>
        </div>
    </div>

    <main class="content">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            ޑޭޓާ ލޯޑްވަމުން ދަނީ...
        </div>
        <div id="status-bar" class="status-bar" style="display:none"></div>
        <div id="output"></div>
    </main>

    <script type="module" src="./index.js"></script>
</body>
</html>
